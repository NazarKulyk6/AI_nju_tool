# ─────────────────────────────────────────────────────────────────────────────
#  docker compose up -d                       → start DB + web server + g4f (AI)
#  docker compose run --rm scraper            → run scraper interactively (CLI)
#  Website: http://localhost:${WEB_HOST_PORT:-3001}
#  G4F API: http://localhost:${G4F_HOST_PORT:-1337}/v1
# ─────────────────────────────────────────────────────────────────────────────
#
#  Network njuskalo_net (bridge):
#  ┌──────────────────────────────────────────────────────────────────────┐
#  │  web      → db:5432          (Express API + static files)            │
#  │  web      → g4f:8080/v1      (AI calls when AI_BACKEND=g4f)         │
#  │  scraper  → db:5432          (Playwright, run manually)              │
#  │  g4f      → (internet)       (gpt4free provider requests)            │
#  └──────────────────────────────────────────────────────────────────────┘
#  Host: localhost:${DB_HOST_PORT:-5438}   → db:5432    (external DB client)
#  Host: localhost:${WEB_HOST_PORT:-3001}  → web:3000   (browser)
#  Host: localhost:${G4F_HOST_PORT:-1337}  → g4f:8080   (external G4F API)
#  Host: localhost:${REDIS_HOST_PORT:-6379}→ redis:6379 (external Redis)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis (job queue + persistence) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: njuskalo_redis
    restart: unless-stopped
    networks:
      - njuskalo_net
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"   # host access (redis-cli, RedisInsight, etc.)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes   # persist queue to disk
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: njuskalo_db
    restart: unless-stopped
    networks:
      - njuskalo_net
    environment:
      POSTGRES_DB:       "${DB_NAME:-scraper}"
      POSTGRES_USER:     "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
    ports:
      - "${DB_HOST_PORT:-5438}:5432"   # host-only (DBeaver, psql, etc.)
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-scraper}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── G4F (gpt4free Interference API) ─────────────────────────────────────────
  # Provides a FREE OpenAI-compatible REST API at http://g4f:8080/v1 (internal)
  # and http://localhost:${G4F_HOST_PORT:-1337}/v1 (external).
  # Starts automatically with docker compose up -d (required when AI_BACKEND=g4f).
  g4f:
    build:
      context: ./g4f_bridge
      dockerfile: Dockerfile
    container_name: njuskalo_g4f
    restart: unless-stopped
    networks:
      - njuskalo_net
    ports:
      - "${G4F_HOST_PORT:-1337}:8080"   # OpenAI-compatible API
    environment:
      G4F_PROVIDERS:         "${G4F_PROVIDERS:-PollinationsAI:openai-fast:1,Yqcloud:gpt-4:3}"
      G4F_FAILURE_THRESHOLD: "${G4F_FAILURE_THRESHOLD:-3}"
      G4F_RESET_AFTER_SEC:   "${G4F_RESET_AFTER_SEC:-300}"
      G4F_MAX_RETRIES:       "${G4F_MAX_RETRIES:-2}"
      G4F_CALL_TIMEOUT:      "${G4F_CALL_TIMEOUT:-60}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Web server ──────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: njuskalo_web
    restart: unless-stopped
    networks:
      - njuskalo_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ── Database ────────────────────────────────────────────────────────────
      DB_HOST:     db       # fixed: Docker service hostname (always "db")
      DB_PORT:     "5432"   # fixed: internal container port (always 5432)
      DB_NAME:     "${DB_NAME:-scraper}"
      DB_USER:     "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      # ── Web server ──────────────────────────────────────────────────────────
      PORT:        "3000"
      # ── Redis (BullMQ queue) ────────────────────────────────────────────────
      REDIS_HOST:  "${REDIS_HOST:-redis}"
      REDIS_PORT:  "${REDIS_PORT:-6379}"
      # ── AI Backend ─────────────────────────────────────────────────────────
      AI_BACKEND:              "${AI_BACKEND:-g4f}"
      AI_CONCURRENCY:          "${AI_CONCURRENCY:-3}"
      AI_CALL_DELAY_MS:        "${AI_CALL_DELAY_MS:-300}"
      # G4F settings (used when AI_BACKEND=g4f)
      G4F_BASE_URL:            "${G4F_BASE_URL:-http://g4f:8080/v1}"
      G4F_ANALYZER_MODEL:      "${G4F_ANALYZER_MODEL:-openai-fast}"
      G4F_SUGGEST_MODEL:       "${G4F_SUGGEST_MODEL:-openai-fast}"
      # Gemini settings (used when AI_BACKEND=gemini)
      GEMINI_API_KEY:          "${GEMINI_API_KEY:-}"
      GEMINI_ANALYZER_MODELS:  "${GEMINI_ANALYZER_MODELS:-gemma-3-27b-it,gemma-3-12b-it,gemini-3.1-flash-lite-preview,gemini-2.5-flash}"
      GEMINI_SUGGEST_MODELS:   "${GEMINI_SUGGEST_MODELS:-gemini-3.1-flash-lite-preview,gemma-3-27b-it,gemini-2.5-flash,gemma-3-12b-it}"
      GEMINI_RETRY_ATTEMPTS:   "${GEMINI_RETRY_ATTEMPTS:-4}"
      # ── Anti-detection ─────────────────────────────────────────────────────
      SCRAPER_CONCURRENCY:          "${SCRAPER_CONCURRENCY:-3}"
      SCRAPER_HEADLESS:             "${SCRAPER_HEADLESS:-false}"
      BROWSER_LOCALE:               "${BROWSER_LOCALE:-hr-HR}"
      BROWSER_TIMEZONE:             "${BROWSER_TIMEZONE:-Europe/Zagreb}"
      DELAY_AFTER_RESULTS_PAGE_MIN: "${DELAY_AFTER_RESULTS_PAGE_MIN:-1500}"
      DELAY_AFTER_RESULTS_PAGE_MAX: "${DELAY_AFTER_RESULTS_PAGE_MAX:-3000}"
      DELAY_BETWEEN_PAGES_MIN:      "${DELAY_BETWEEN_PAGES_MIN:-2000}"
      DELAY_BETWEEN_PAGES_MAX:      "${DELAY_BETWEEN_PAGES_MAX:-5000}"
      DELAY_BETWEEN_LISTINGS_MIN:   "${DELAY_BETWEEN_LISTINGS_MIN:-500}"
      DELAY_BETWEEN_LISTINGS_MAX:   "${DELAY_BETWEEN_LISTINGS_MAX:-2000}"
      DELAY_AFTER_LISTING_MIN:      "${DELAY_AFTER_LISTING_MIN:-1000}"
      DELAY_AFTER_LISTING_MAX:      "${DELAY_AFTER_LISTING_MAX:-2500}"
      RETRY_MAX_ATTEMPTS:           "${RETRY_MAX_ATTEMPTS:-3}"
      RETRY_BASE_DELAY_MS:          "${RETRY_BASE_DELAY_MS:-3000}"
    ports:
      - "${WEB_HOST_PORT:-3001}:3000"

  # ── Scraper ─────────────────────────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime       # playwright + xvfb stage
    container_name: njuskalo_scraper
    stdin_open: true        # required for CLI prompt
    tty: true
    networks:
      - njuskalo_net
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Database ────────────────────────────────────────────────────────────
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     "${DB_NAME:-scraper}"
      DB_USER:     "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      # ── AI Backend ─────────────────────────────────────────────────────────
      AI_BACKEND:              "${AI_BACKEND:-g4f}"
      AI_CONCURRENCY:          "${AI_CONCURRENCY:-3}"
      AI_CALL_DELAY_MS:        "${AI_CALL_DELAY_MS:-300}"
      G4F_BASE_URL:            "${G4F_BASE_URL:-http://g4f:8080/v1}"
      G4F_ANALYZER_MODEL:      "${G4F_ANALYZER_MODEL:-openai-fast}"
      G4F_SUGGEST_MODEL:       "${G4F_SUGGEST_MODEL:-openai-fast}"
      GEMINI_API_KEY:          "${GEMINI_API_KEY:-}"
      GEMINI_ANALYZER_MODELS:  "${GEMINI_ANALYZER_MODELS:-gemma-3-27b-it,gemma-3-12b-it,gemini-3.1-flash-lite-preview,gemini-2.5-flash}"
      GEMINI_SUGGEST_MODELS:   "${GEMINI_SUGGEST_MODELS:-gemini-3.1-flash-lite-preview,gemma-3-27b-it,gemini-2.5-flash,gemma-3-12b-it}"
      GEMINI_RETRY_ATTEMPTS:   "${GEMINI_RETRY_ATTEMPTS:-4}"
      # ── Anti-detection ─────────────────────────────────────────────────────
      SCRAPER_CONCURRENCY:          "${SCRAPER_CONCURRENCY:-3}"
      SCRAPER_HEADLESS:             "${SCRAPER_HEADLESS:-false}"
      BROWSER_LOCALE:               "${BROWSER_LOCALE:-hr-HR}"
      BROWSER_TIMEZONE:             "${BROWSER_TIMEZONE:-Europe/Zagreb}"
      DELAY_AFTER_RESULTS_PAGE_MIN: "${DELAY_AFTER_RESULTS_PAGE_MIN:-1500}"
      DELAY_AFTER_RESULTS_PAGE_MAX: "${DELAY_AFTER_RESULTS_PAGE_MAX:-3000}"
      DELAY_BETWEEN_PAGES_MIN:      "${DELAY_BETWEEN_PAGES_MIN:-2000}"
      DELAY_BETWEEN_PAGES_MAX:      "${DELAY_BETWEEN_PAGES_MAX:-5000}"
      DELAY_BETWEEN_LISTINGS_MIN:   "${DELAY_BETWEEN_LISTINGS_MIN:-500}"
      DELAY_BETWEEN_LISTINGS_MAX:   "${DELAY_BETWEEN_LISTINGS_MAX:-2000}"
      DELAY_AFTER_LISTING_MIN:      "${DELAY_AFTER_LISTING_MIN:-1000}"
      DELAY_AFTER_LISTING_MAX:      "${DELAY_AFTER_LISTING_MAX:-2500}"
      RETRY_MAX_ATTEMPTS:           "${RETRY_MAX_ATTEMPTS:-3}"
      RETRY_BASE_DELAY_MS:          "${RETRY_BASE_DELAY_MS:-3000}"
    profiles:
      - scraper              # does not start on `docker-compose up`

# ─── Named network ─────────────────────────────────────────────────────────────
networks:
  njuskalo_net:
    driver: bridge

# ─── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
